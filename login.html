<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tez Tibbiy Yordam — Kirish</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== LIGHT MODE (default) ===== */
    :root {
      --bg-body: linear-gradient(135deg, #E24B4A 0%, #c0392b 100%);
      --bg-card: #ffffff;
      --text-primary: #111111;
      --text-secondary: #555555;
      --text-muted: #888888;
      --border: #e0e0e0;
      --input-bg: #ffffff;
      --tab-bg: #f5f5f5;
      --error-bg: #FCEBEB;
      --error-color: #791F1F;
      --btn-google-bg: #ffffff;
      --btn-google-color: #333333;
      --divider-color: #bbb;
    }

    /* ===== DARK MODE ===== */
    body.dark {
      --bg-body: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      --bg-card: #1e1e2e;
      --text-primary: #e0e0e0;
      --text-secondary: #aaaaaa;
      --text-muted: #777777;
      --border: #3a3a4a;
      --input-bg: #2a2a3e;
      --tab-bg: #2a2a3e;
      --error-bg: #3a1a1a;
      --error-color: #ff8888;
      --btn-google-bg: #2a2a3e;
      --btn-google-color: #e0e0e0;
      --divider-color: #555;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      transition: background 0.3s;
    }
    .card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      transition: background 0.3s;
      position: relative;
    }

    /* DARK MODE TOGGLE */
    .dark-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      padding: 4px;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .dark-toggle:hover { transform: rotate(20deg); }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo .icon { font-size: 48px; }
    .logo h1 { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-top: 8px; }
    .logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .tabs {
      display: flex;
      background: var(--tab-bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--bg-card);
      color: #E24B4A;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .form-group { margin-bottom: 14px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: var(--input-bg);
      color: var(--text-primary);
      transition: border-color 0.2s, background 0.3s;
    }
    .form-group input:focus { border-color: #E24B4A; }

    .btn-main {
      width: 100%;
      padding: 13px;
      background: #E24B4A;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }
    .btn-main:hover { background: #c0392b; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--divider-color);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      width: 100%;
      padding: 12px;
      background: var(--btn-google-bg);
      color: var(--btn-google-color);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }
    .btn-google:hover { opacity: 0.85; }
    .btn-google img { width: 20px; height: 20px; }

    .error-box {
      background: var(--error-bg);
      color: var(--error-color);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }
  </style>
</head>
<body>
<div class="card">
  <button class="dark-toggle" onclick="toggleDark()" id="darkBtn" title="Tungi rejim">🌙</button>

  <div class="logo">
    <div class="icon">🚑</div>
    <h1>Tez Tibbiy Yordam</h1>
    <p>Professional tibbiy ma'lumotnoma</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('login')">Kirish</button>
    <button class="tab-btn" onclick="showTab('register')">Ro'yxatdan o'tish</button>
  </div>

  <div id="errorBox" class="error-box"></div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="email@gmail.com">
    </div>
    <div class="form-group">
      <label>Parol</label>
      <input type="password" id="loginPassword" placeholder="Parolingiz">
    </div>
    <button class="btn-main" onclick="loginUser()">Kirish</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" style="display:none;">
    <div class="form-group">
      <label>Ism Familiya</label>
      <input type="text" id="regName" placeholder="Abdurasul Zokirov">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="email@gmail.com">
    </div>
    <div class="form-group">
      <label>Parol</label>
      <input type="password" id="regPassword" placeholder="Kamida 6 ta belgi">
    </div>
    <button class="btn-main" onclick="registerUser()">Ro'yxatdan o'tish</button>
  </div>

  <div class="divider">yoki</div>
  <button class="btn-google" onclick="googleLogin()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Google bilan kirish
  </button>
</div>

<script type="module">
import { auth } from './firebase.js';
import {
  GoogleAuthProvider,
  signInWithPopup,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Dark mode
function applyDark(dark) {
  document.body.classList.toggle('dark', dark);
  document.getElementById('darkBtn').textContent = dark ? '☀️' : '🌙';
}
const savedDark = localStorage.getItem('darkMode') === 'true';
applyDark(savedDark);
window.toggleDark = () => {
  const now = !document.body.classList.contains('dark');
  localStorage.setItem('darkMode', now);
  applyDark(now);
};

// Agar kirgan bo'lsa index.html ga o'tkazish
onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = 'index.html';
});

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.style.display = 'block';
}

window.showTab = (tab) => {
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
};

window.loginUser = async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return showError('Email va parol kiriting!');
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (err) {
    const msgs = {
      'auth/user-not-found': 'Foydalanuvchi topilmadi!',
      'auth/wrong-password': 'Parol noto\'g\'ri!',
      'auth/invalid-email': 'Email noto\'g\'ri formatda!',
      'auth/invalid-credential': 'Email yoki parol noto\'g\'ri!'
    };
    showError(msgs[err.code] || err.message);
  }
};

window.registerUser = async () => {
  const name = document.getElementById('regName').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  if (!name || !email || !password) return showError('Barcha maydonlarni to\'ldiring!');
  if (password.length < 6) return showError('Parol kamida 6 ta belgi bo\'lishi kerak!');
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
  } catch (err) {
    const msgs = {
      'auth/email-already-in-use': 'Bu email allaqachon ro\'yxatdan o\'tgan!',
      'auth/invalid-email': 'Email noto\'g\'ri formatda!',
      'auth/weak-password': 'Parol juda oddiy!'
    };
    showError(msgs[err.code] || err.message);
  }
};

window.googleLogin = async () => {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch (err) {
    showError('Google bilan kirishda xatolik: ' + err.message);
  }
};
</script>
</body>
</html>
